<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>비밀 고해소 - 비밀의 연못</title>
    <link rel="stylesheet" href="/static/public_recorder.css" />
    <script src="/static/public_recorder.js" defer></script>
  </head>
  <body>
    <main class="recorder-shell">
      <section class="recorder" aria-labelledby="recorderTitle">
        <p class="eyebrow">비밀의 연못</p>
        <h1 id="recorderTitle">비밀 고해소</h1>

        <div class="intro-copy">
          <p class="assurance">
            이곳에 남긴 말은<br />
            누구에게도 전달되거나 들려지지 않습니다.
          </p>
          <p class="stack-line">
            당신의 목소리는 다른 목소리들과 겹쳐져<br />
            비밀의 연못에 고입니다.
          </p>
          <p class="confession-line">
            정말로 말 못 할 비밀이든, 후회하는 말이든, 끝내 전하지 못하는 진심.
          </p>
          <p class="invitation-line">
            어쩌면 누군가 알아줬으면 하지만 동시에 아무도 알지 않았으면 하는 속마음을
            두고 가세요.
          </p>
        </div>

        <div class="record-meter" aria-live="polite">
          <span id="elapsedTime">0:00</span>
          <span id="recordState">기다림</span>
        </div>

        <div class="actions" aria-label="녹음 작업">
          <button id="startButton" type="button" class="primary">말하기</button>
          <button id="stopButton" type="button" class="danger" disabled>그만두기</button>
          <button id="rerecordButton" type="button" class="secondary" hidden>다시하기</button>
          <button id="addButton" type="button" class="primary" hidden>두고가기</button>
        </div>

        <p id="statusMessage" class="status" role="status" aria-live="polite"></p>
      </section>
    </main>
  </body>
</html>
