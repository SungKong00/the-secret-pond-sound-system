goal: Replace Secret Pond's current WEQ8C-based Graph EQ editor input/rendering layer
  with a DSSSP-based React island while preserving the existing Graph EQ model/render
  core and Live/Stable audio application structure
task_type: code
brownfield_context:
  project_type: brownfield
  context_references:
  - path: /Users/nohsungbeen/dev/project/The Secret Pond
    role: primary
    summary: Existing Secret Pond codebase with audio runtime, operator UI, Graph
      EQ model/render core, Live/Stable apply structure, and dirty worktree constraints
  - path: AGENTS.md
    role: reference
    summary: Repository workflow guide requiring Ouroboros for non-trivial changes
      and uv run pytest plus uv run ruff check verification
  - path: pyproject.toml
    role: reference
    summary: Existing dirty dependency/configuration file that must not be touched
      unless separately requested
  - path: uv.lock
    role: reference
    summary: Existing dirty lockfile that must not be touched unless separately requested
  existing_patterns:
  - Existing Graph EQ model/render core remains the source of truth for values and
    curve/control recalculation
  - Existing Live mode uses 1 second debounce with latest-wins render/swap
  - Existing Stable mode applies sound changes only through Apply and Restart
  - Existing operator UI includes inline layer card UX
  - Existing supported Graph EQ bands are Low Shelf, Bell/Peak, and High Shelf
  - Existing Python workflow uses uv run pytest and uv run ruff check .
  - UI-visible changes require rendered dashboard verification
  existing_dependencies:
  - DSSSP React editor for graph UI input/rendering
  - Existing Secret Pond Graph EQ model/render core
  - Existing Secret Pond Live/Stable audio apply pipeline
  - Existing WAV render/buffer swap audio runtime
  - Playwright for UI verification
  - Python/audio tests for render core and Live/Stable boundary
  - uv pytest workflow
  - ruff lint workflow
constraints:
- Keep existing Graph EQ model/render core
- Keep existing Live/Stable apply structure
- Remove only WEQ8C-based graph editor input/rendering layer
- Use DSSSP as a point/curve UI editor, not as an audio processing engine
- Live mode must keep 1 second debounce after last input
- Live mode must use cancelable latest-wins render/swap and discard stale render results
- Stable mode must only update draft/screen before Apply and Restart
- Stable mode must not change actual sound/buffer before Apply and Restart
- DSSSP ended event pattern must distinguish drag completion
- Fast UI point/curve updates must be immediate
- Failed render/upload must not snap UI draft back to prior values
- Audible playback must keep existing confirmed buffer on failure
- Low Shelf frequency must stay fixed at left endpoint
- High Shelf frequency must stay fixed at right endpoint
- Bell/Peak may move frequency and gain
- Q is adjusted only by wheel or numeric control in v1
- Notch is out of scope for v1
- Do not adopt Web Audio AudioParam realtime EQ engine in v1
- Do not rewrite the whole dashboard in React
- Mobile optimization is not required
- Do not touch existing dirty pyproject.toml or uv.lock unless separately requested
- Non-commercial single-operator university exhibition usage
acceptance_criteria:
- DSSSP React island visually matches existing Graph EQ model values
- Handle center and calculated curve/control position differ by no more than 2px after
  normal drag
- Low Shelf remains attached to left edge and cannot move on x axis
- High Shelf remains attached to right edge and cannot move on x axis
- Bell/Peak supports x-axis frequency movement and y-axis gain movement
- Fast repeated drag leaves only the final value as Live render/swap target
- Live keeps 1 second debounce after final input
- Live discards stale render results
- Stable causes no actual sound/buffer change before Apply and Restart
- On failure, audible playback keeps the existing confirmed buffer
- On failure, UI draft remains at the user-moved value
- Any failure that snaps a point back to its old position fails acceptance
- Existing Low Shelf/Bell/Peak/High Shelf audio render behavior has no regression
- Notch is not implemented in v1
- Playwright verifies extreme drag, fast repeated drag, endpoint lock, and right panel
  layout stability
- Python/audio tests verify existing Graph EQ render core and Live/Stable boundary
ontology_schema:
  name: GraphEQDSSSPReplacement
  description: Domain model for replacing Secret Pond's WEQ8C Graph EQ editor layer
    with a DSSSP React island while preserving existing audio rendering and Live/Stable
    application semantics
  fields:
  - name: band_type
    type: string
    description: Graph EQ band type such as Low Shelf, Bell/Peak, or High Shelf
    required: true
  - name: frequency
    type: number
    description: Band center or endpoint frequency, fixed for shelf endpoints in v1
    required: true
  - name: gain
    type: number
    description: Band gain controlled on the y axis
    required: true
  - name: q
    type: number
    description: Band Q value controlled by wheel or numeric input only in v1
    required: true
  - name: draft_state
    type: object
    description: UI-side editable EQ state updated immediately during interaction
    required: true
  - name: confirmed_state
    type: object
    description: Last successfully applied audio/render state
    required: true
  - name: apply_mode
    type: string
    description: Live or Stable application mode
    required: true
  - name: drag_ended
    type: boolean
    description: Whether DSSSP reported ended=true for drag completion
    required: true
  - name: debounce_delay_ms
    type: number
    description: Live debounce delay after the last input, fixed at 1000ms
    required: true
  - name: latest_wins_token
    type: string
    description: Identifier used to discard stale render/swap results
    required: true
  - name: render_result
    type: object
    description: Graph EQ model/render core output used for curve and handle snapping
    required: true
  - name: failure_state
    type: object
    description: Render or apply failure state where playback remains confirmed and
      draft remains local
    required: true
evaluation_principles:
- name: Model Fidelity
  description: DSSSP UI must remain visually and behaviorally snapped to the existing
    Graph EQ model/render core
  weight: 0.25
- name: Apply Semantics
  description: Live debounce/latest-wins and Stable Apply and Restart boundaries must
    remain intact
  weight: 0.25
- name: Interaction Correctness
  description: Click, drag, shelf endpoint lock, Bell/Peak movement, Q control, and
    ended handling must match the agreed contract
  weight: 0.2
- name: Failure UX
  description: Failures must preserve confirmed playback while keeping user draft
    state without rollback jumps
  weight: 0.15
- name: Regression Safety
  description: Existing Low Shelf/Bell/Peak/High Shelf render behavior and dashboard
    layout must not regress
  weight: 0.15
exit_conditions:
- name: AcceptanceComplete
  description: All listed acceptance criteria pass
  criteria: Playwright and Python/audio verification pass with no blocking regressions
- name: ScopeBoundaryReached
  description: v1 excludes requested out-of-scope work
  criteria: No Notch, Web Audio realtime engine rewrite, or full React dashboard rewrite
    is introduced
- name: BrownfieldSafetyMaintained
  description: Existing constraints and dirty worktree boundaries are respected
  criteria: Existing model/render core, Live/Stable structure, pyproject.toml, and
    uv.lock are preserved unless explicitly authorized
