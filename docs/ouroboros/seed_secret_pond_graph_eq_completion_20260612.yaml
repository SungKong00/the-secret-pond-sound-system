goal: >-
  Complete the unfinished Graph EQ follow-up for The Secret Pond by making the
  dashboard behave like a direct-manipulation curve editor, fixing the Live Graph
  EQ voice-source failure, wiring the 1 second Live debounce executor so pending
  renders actually apply, and tightening legacy EQ/source contracts so Stable
  remains the safe Apply and Restart fallback.
task_type: code
brownfield_context:
  project_type: brownfield
  context_references:
    - path: /Users/nohsungbeen/dev/project/The Secret Pond
      role: primary_checkout
      summary: Main local checkout. Current branch is main with Graph EQ feature commits merged.
    - path: AGENTS.md
      role: repository_guidance
      summary: Use Ouroboros for non-trivial work, verify with uv run pytest and uv run ruff check ., verify rendered dashboard for UI-visible changes, and keep focused Korean Conventional Commit messages.
    - path: docs/ouroboros/seed_secret_pond_graph_eq_live_stable_20260612.yaml
      role: prior_seed
      summary: Original Graph EQ Seed that established draggable EQ points, Stable fallback, Live debounce/render/swap, EQ-free source usage, and Korean UI copy with English technical terms.
    - path: docs/superpowers/plans/2026-06-12-secret-pond-graph-eq.md
      role: prior_plan
      summary: Original implementation plan. Several core slices landed, but UI direct-manipulation polish and Live executor/source gaps remain.
    - path: src/secret_pond/web/static/index.html
      role: current_graph_eq_markup
      summary: Graph EQ workspace exists with SVG graph, Low/Mid/Voice tabs, selected point controls, and Filter Range.
    - path: src/secret_pond/web/static/app.js
      role: current_graph_eq_behavior
      summary: Point-circle dragging exists, but graph/curve-area dragging does not; Live status copy and discoverability need improvement.
    - path: src/secret_pond/audio/renderer.py
      role: live_source_contract
      summary: Live Graph EQ renders from EQ-free source material and rejects playback cache files, but missing selected voice stack paths currently fail instead of falling back to valid live_ephemeral raw stack material.
    - path: src/secret_pond/audio/source_library.py
      role: source_selection_contract
      summary: selected_source_path currently returns selected voice_stack_path before legacy voice_stack_raw fallback, even if the selected file is stale or missing.
    - path: src/secret_pond/services/live_graph_eq.py
      role: live_request_core
      summary: Live Graph EQ request ids, debounce constants, latest-wins validation, failure warning, rollback state, and render/swap helper exist.
    - path: src/secret_pond/services/settings_draft.py
      role: live_schedule_entrypoint
      summary: Live draft updates schedule Live Graph EQ requests, but no web/runtime executor path currently calls run_due_live_graph_eq_update.
    - path: src/secret_pond/services/playback_apply_mode.py
      role: mode_boundary
      summary: Stable-to-Live attempts to replace EQ artifacts with Live EQ-free buffers and rolls back on failure.
    - path: data/logs/events.jsonl
      role: local_failure_evidence
      summary: Contains settings.live_graph_eq_failed at 2026-06-12T00:22:12Z because voice source data/sources/voice/stack/VS0608_072702.wav was unavailable.
    - path: data/config/settings.json
      role: local_state_evidence
      summary: Active and draft settings point voice_stack_path to missing data/sources/voice/stack/VS0608_072702.wav while voice_stack.mode is live_ephemeral.
    - path: data/voice/voice_stack_raw.wav
      role: available_voice_source
      summary: Existing EQ-free live_ephemeral Voice Stack source file that should be usable when the selected timestamped stack file is stale or absent.
  current_findings:
    - Graph EQ point dragging is implemented only on SVG circle handles. Dragging the curve path or graph background does not move the nearest point.
    - The UI can still feel slider-like because Filter Range remains slider-based and point handles are small and under-explained by interaction affordance.
    - The failure message shown to the operator is the expected rollback warning, but the root cause is a real source-contract bug: the selected voice_stack_path points at a file that no longer exists.
    - In live_ephemeral mode, data/voice/voice_stack_raw.wav exists and represents the current stack material, but the Live EQ renderer does not fall back to it when a stale selected voice_stack_path exists.
    - Live Graph EQ scheduling exists, but the web/runtime layer does not currently expose a timer, poll, or background loop that calls run_due_live_graph_eq_update after the 1 second debounce.
    - EqSettings still contains low_gain_db, mid_gain_db, and high_gain_db compatibility fields; backend graph_eq.py can read them as legacy fallback, while Graph EQ UI mainly presents points.
  existing_patterns:
    - Keep backend/runtime state as source of truth.
    - Keep routes thin and move behavior into service modules.
    - Preserve Stable Apply and Restart as the safe fallback.
    - Keep audio callback work lightweight; render/swap outside the callback.
    - Use EQ-free source material for Live Graph EQ and never re-EQ playback cache files.
    - Use latest-wins request ids and mode epochs to discard stale Live results.
    - Keep technical audio terms in English and ordinary operator actions/status messages in Korean.
    - Follow the existing static HTML/CSS/vanilla JS dashboard rather than introducing a frontend framework.
constraints:
  - Do not start broad refactors. This Seed is a completion/fix slice on top of the existing Graph EQ implementation.
  - Do not edit, format, stage, or commit existing dirty pyproject.toml or uv.lock unless the user explicitly expands scope.
  - Stable mode remains the safety path. Stable Graph EQ edits stay staged until Apply and Restart.
  - Live mode must continue using a named 1 second debounce and a fast buffer replacement, not sample-accurate callback DSP.
  - Live buffer replacement must preserve playback position and must not use a slow musical crossfade. A short de-click guard up to 50 ms remains acceptable.
  - Live Graph EQ must never render from low_playback.wav, mid_playback.wav, voice_playback.wav, or another already-EQ-baked playback cache.
  - For voice in live_ephemeral mode, data/voice/voice_stack_raw.wav is valid EQ-free stack material and must be considered before failing due to a stale timestamped voice_stack_path.
  - If a selected source path is stale or missing, the operator-facing warning must identify the missing source category and the fallback used or unavailable fallback, not only show a generic Live Graph EQ failure.
  - Graph EQ v1 remains desktop/operator focused. Mobile optimization remains out of scope, but desktop rendering must not overlap or break.
  - Keep Filter Range as Low Cut / High Cut slider controls inside Graph EQ; do not turn Low Cut / High Cut into draggable EQ points in this slice.
  - Preserve the existing maximum of 6 points per layer, 20 Hz to 20 kHz frequency range, -18 dB to +18 dB gain range, and Q 0.1 to 18.
  - The curve rendered in the browser remains a visual approximation. Audio correctness is defined by backend render/filter behavior.
  - Existing old EQ fields may be kept temporarily only as compatibility input. New UI and new stored draft changes should prefer points.
  - Operator copy must stay Korean-first for state/action/failure text while preserving technical names such as Graph EQ, Bell / Peak, Low Shelf, High Shelf, Freq, Gain, Q, Low Cut, High Cut, Live, Stable, and Apply and Restart.
  - No new React/Vite/front-end framework. Vanilla JS/CSS changes should match the current Secret Pond dashboard.
acceptance_criteria:
  - id: ui_direct_manipulation
    description: >-
      The Graph EQ editor supports dragging a point handle and also dragging the
      visible curve/graph area to move the nearest editable point, so the primary
      interaction can be completed from the graph surface without targeting only
      the small SVG circle.
    verification:
      - Static JS tests exercise nearest-point selection from graph pointer coordinates.
      - Tests or DOM inspection confirm pointerdown is bound for point handles, curve path, and graph background.
      - Browser or DOM verification confirms point handles/curve have grab affordance and selected state.
  - id: ui_affordance
    description: >-
      Point handles use a desktop grab target of at least 16 CSS pixels or an
      equivalent invisible hit area, show hover/selected states, and expose
      grab/grabbing cursor classes on interactive graph elements.
    verification:
      - Rendered dashboard check on desktop viewport.
      - CSS/static tests confirm graph-eq-point, graph-eq-curve, hover/selected, and drag-active interaction classes exist.
  - id: ui_copy
    description: >-
      Graph EQ status copy tells the operator what is happening in Korean without
      over-explaining audio theory; selected point controls keep English
      technical terms.
    verification:
      - Static DOM tests include Graph EQ, Freq, Gain, Q, 점을 선택하세요, and Korean Live status messages.
  - id: stale_voice_stack_source_fallback
    description: >-
      When voice_stack.mode is live_ephemeral and the selected voice_stack_path is
      missing or stale, Live Graph EQ uses data/voice/voice_stack_raw.wav as the
      EQ-free source if it exists.
    verification:
      - Renderer/source tests create a missing selected voice_stack_path and an existing voice_stack_raw.wav, then assert Live Graph EQ renders successfully from voice_stack_raw.wav.
  - id: missing_voice_source_failure
    description: >-
      If neither selected voice stack source nor voice_stack_raw.wav exists, Live
      Graph EQ fails safely, preserves audible playback, rolls back any partial
      swap, and logs a specific source-unavailable error.
    verification:
      - Service tests assert player buffer updates are unchanged, transition_warning is set, and logger payload includes layer_id=voice and missing source details.
  - id: live_mode_switch_no_false_failure
    description: >-
      Switching Stable to Live must not fail merely because a stale timestamped
      voice_stack_path is present when a valid live_ephemeral raw stack source is
      available.
    verification:
      - Playback apply mode test reproduces the current logged failure shape and passes after fallback.
  - id: live_debounce_executor
    description: >-
      A server/runtime-owned executor path calls run_due_live_graph_eq_update
      after the 1 second debounce and exposes resulting state to the dashboard
      through an API or state-polling surface; the frontend may trigger or
      observe this path but must not own the render/swap authority.
    verification:
      - Route/service tests schedule a Live request, advance or simulate due time, call the executor path, and assert the buffer swap occurred.
  - id: latest_wins_executor
    description: >-
      Rapid Live Graph EQ edits still apply only the latest pending request; older
      due or completed work is discarded by request id and mode epoch.
    verification:
      - Service/API tests schedule multiple requests and assert only the last request updates playback_render_settings and player buffer state.
  - id: slow_apply_status
    description: >-
      If a pending Live Graph EQ request exceeds the 3 second slow threshold after
      debounce, the dashboard can show a nonfatal Korean caution without rolling
      back playback.
    verification:
      - Tests cover mark_slow_live_graph_eq_requests and state payload/UI message.
  - id: failure_recovery_ui_state
    description: >-
      After Live Graph EQ failure, the graph UI reflects the last confirmed
      audible EQ state rather than leaving the operator looking at an un-applied
      curve as if it succeeded.
    verification:
      - Service/static UI tests cover confirmed EQ rollback state.
  - id: legacy_eq_normalization
    description: >-
      Legacy low_gain_db/mid_gain_db/high_gain_db values do not create a mismatch
      where backend audio uses legacy fallback but the Graph EQ curve appears flat.
      The implementation either normalizes legacy values into points on load/save
      or removes the legacy fallback from new runtime-visible state with tests.
    verification:
      - Tests load settings containing legacy gain fields with default points and assert UI-visible Graph EQ and backend render semantics agree.
  - id: no_double_eq_regression
    description: >-
      Live Graph EQ still refuses playback cache sources and does not introduce a
      fallback that reuses already-EQ-baked rendered files.
    verification:
      - Tests assert low_playback.wav, mid_playback.wav, and voice_playback.wav are rejected as Live Graph EQ sources.
  - id: stable_contract_preserved
    description: >-
      Stable mode behavior is unchanged: edits remain staged, Apply and Restart is
      the audible apply path, and the new Live executor does not run in Stable.
    verification:
      - Existing Stable tests plus focused regression for no pending Live request execution in Stable.
  - id: docs_updated
    description: >-
      Operator docs/checklist explain direct graph dragging, Live source fallback,
      stale source warning behavior, Live debounce executor, and Stable fallback.
    verification:
      - docs/operator-guide.md and docs/audio-setup-checklist.md are updated and explicitly inspected.
      - If docs tests exist for these files, they pass; otherwise the implementation summary records manual documentation verification.
  - id: full_verification
    description: >-
      Final verification includes targeted tests for UI/source/executor behavior,
      then uv run pytest and uv run ruff check ., plus a rendered dashboard check.
    verification:
      - Record exact commands and outcomes in the implementation summary.
ontology_schema:
  name: SecretPondGraphEqCompletion
  description: >-
    Follow-up domain model for completing Graph EQ direct manipulation and Live
    source/executor contracts in The Secret Pond.
  fields:
    - name: graph_eq_editor
      type: object
      description: Dashboard surface containing graph SVG, curve path, point handles, selected point controls, layer tabs, and Filter Range.
    - name: graph_drag_target
      type: object
      description: Pointer target derived from a point handle, curve path, or graph background that maps to the nearest editable EQ point.
    - name: eq_point
      type: object
      description: Bell / Peak, Low Shelf, or High Shelf point with frequency_hz, gain_db, q, and stable id.
    - name: confirmed_audible_eq
      type: object
      description: Last EQ state successfully rendered and swapped into audible Live playback.
    - name: live_graph_eq_request
      type: object
      description: Latest-wins pending request with id, layer, settings snapshot, due_at_ms, mode epoch, status, and failure reason.
    - name: live_debounce_executor
      type: object
      description: Runtime/API mechanism that advances due Live Graph EQ requests outside the audio callback.
    - name: eq_free_source
      type: object
      description: Source material that does not already contain playback EQ; includes selected low/mid source files and voice stack raw material.
    - name: stale_source
      type: object
      description: A selected source path that no longer exists on disk and should be repaired, replaced by a valid fallback, or reported specifically.
    - name: playback_cache_source
      type: object
      description: Already rendered playback cache files such as low_playback.wav, mid_playback.wav, and voice_playback.wav that must never be used as Live Graph EQ source material.
    - name: filter_range
      type: object
      description: Low Cut and High Cut slider controls that stay visually separate from draggable Graph EQ points.
    - name: operator_warning
      type: object
      description: Korean-facing warning or caution text that explains Live Graph EQ failure, stale source details, fallback behavior, or slow apply status.
    - name: live_slow_status
      type: object
      description: Nonfatal Live Graph EQ state shown when a pending request exceeds the slow threshold after debounce.
    - name: layer_id
      type: string
      description: One of low, mid, or voice; scopes Graph EQ requests, source resolution, and UI layer tabs.
    - name: mode_epoch
      type: integer
      description: Runtime epoch used to discard stale Live Graph EQ requests after Live/Stable boundary changes.
    - name: live_ephemeral_voice_stack
      type: object
      description: Voice Stack mode where data/voice/voice_stack_raw.wav is the current EQ-free stack source and timestamped stack source files may be absent.
    - name: stable_apply_fallback
      type: object
      description: Existing Apply and Restart path that remains the recovery route when Live Graph EQ cannot apply.
    - name: legacy_eq_fields
      type: object
      description: Compatibility low_gain_db/mid_gain_db/high_gain_db fields that must not contradict Graph EQ points in visible or audible state.
evaluation_principles:
  - name: root_cause_fix
    description: Fix the verified Live failure at its source contract rather than hiding the warning or weakening rollback.
    weight: 0.24
  - name: operator_directness
    description: The graph must feel like a direct curve editor, not an old slider surface with a passive chart.
    weight: 0.2
  - name: live_stable_boundary
    description: Live executor and source fallback must not blur Stable staged behavior or create hidden audible changes in Stable.
    weight: 0.2
  - name: audio_safety
    description: Preserve playback on failures, avoid double EQ, keep file/render work out of the audio callback, and keep rollback testable.
    weight: 0.22
  - name: scoped_completion
    description: Finish the known gaps without adding analyzer, presets, undo/redo, mobile editing optimization, or a new frontend framework.
    weight: 0.14
exit_conditions:
  - name: complete
    description: All acceptance criteria are met and verified with targeted tests, full pytest, ruff, and rendered dashboard verification.
    criteria:
      - Targeted UI/source/executor tests pass.
      - uv run pytest passes.
      - uv run ruff check . passes.
      - Rendered dashboard check confirms direct manipulation UI and no desktop overlap.
  - name: blocked_by_source_contract
    description: Voice Stack source ownership is still ambiguous after code inspection and tests cannot safely choose between selected timestamped stack files and voice_stack_raw.wav.
    criteria:
      - Stop before implementing unsafe double-EQ or silent wrong-source behavior.
      - Report exact missing decision and affected paths.
  - name: blocked_by_executor_model
    description: No acceptable web/runtime mechanism can run due Live requests without creating callback or request-lifecycle risk.
    criteria:
      - Stable fallback remains intact.
      - Report proposed alternatives and required user decision.
implementation_slices:
  - id: slice_0_reproduce_and_lock_failures
    title: Reproduce current Live failure and UI gaps with tests first
    files:
      inspect:
        - data/logs/events.jsonl
        - data/config/settings.json
        - data/voice/voice_stack_raw.wav
        - src/secret_pond/audio/renderer.py
        - src/secret_pond/audio/source_library.py
        - src/secret_pond/web/static/app.js
      test:
        - tests/audio/test_renderer.py
        - tests/services/test_playback_apply_mode.py
        - tests/services/test_live_graph_eq.py
        - tests/web/test_routes.py
    work:
      - Re-check git status and preserve unrelated dirty files.
      - Add a regression test for Stable-to-Live failing on stale voice_stack_path despite existing voice_stack_raw.wav.
      - Add static UI tests for curve/background nearest-point drag behavior.
      - Add a test proving scheduled Live requests need an executor path.
    verification:
      - Run the focused new tests and confirm they fail before implementation.
  - id: slice_1_live_voice_source_fallback
    title: Fix EQ-free voice source fallback for live_ephemeral
    files:
      modify:
        - src/secret_pond/audio/source_library.py
        - src/secret_pond/audio/renderer.py
      test:
        - tests/audio/test_renderer.py
        - tests/services/test_playback_apply_mode.py
    work:
      - Define a helper that resolves Live EQ source material separately from generic selected_source_path.
      - For voice + live_ephemeral, use existing data/voice/voice_stack_raw.wav when selected voice_stack_path is stale or absent.
      - Keep playback cache rejection intact.
      - Improve error detail when no EQ-free voice source exists.
    verification:
      - Focused source fallback tests pass.
      - Existing no-double-EQ tests still pass.
  - id: slice_2_live_debounce_executor
    title: Wire due Live Graph EQ requests into runtime/API execution
    files:
      modify:
        - src/secret_pond/services/live_graph_eq.py
        - src/secret_pond/services/settings_draft.py
        - src/secret_pond/web/routes.py
        - src/secret_pond/web/state.py
        - src/secret_pond/web/static/app.js
      test:
        - tests/services/test_live_graph_eq.py
        - tests/services/test_settings_draft.py
        - tests/web/test_routes.py
    work:
      - Add a thin route or existing-state poll hook that runs due Live Graph EQ updates under operation_lock.
      - Expose pending/applying/applied/slow/failed state in /api/state or a focused endpoint.
      - Ensure frontend schedules/polls the executor only in Live mode with pending Live Graph EQ work.
      - Keep latest-wins request ids and mode epoch invalidation as the authority.
    verification:
      - Tests prove due requests apply after debounce and older requests are discarded.
      - Tests prove Stable mode does not execute Live requests.
  - id: slice_3_direct_manipulation_ui
    title: Make the graph feel like a draggable EQ curve
    files:
      modify:
        - src/secret_pond/web/static/app.js
        - src/secret_pond/web/static/styles.css
        - src/secret_pond/web/static/index.html
      test:
        - tests/web/test_routes.py
    work:
      - Add nearest-point selection for pointerdown on graph curve/background.
      - Move the nearest selected point during drag and commit only on pointerup.
      - Enlarge handles and add grab/grabbing cursor, hover, selected, and active drag states.
      - Keep Add/Delete buttons as the only point create/delete controls in v1.
      - Keep Filter Range visually separate and slider-based.
    verification:
      - Static JS tests cover coordinate mapping and nearest-point behavior.
      - Rendered dashboard check confirms graph affordance and layout.
  - id: slice_4_legacy_eq_state_alignment
    title: Align legacy EQ fields with Graph EQ points
    files:
      modify:
        - src/secret_pond/config.py
        - src/secret_pond/audio/graph_eq.py
        - src/secret_pond/web/static/app.js
      test:
        - tests/test_config.py
        - tests/audio/test_graph_eq.py
        - tests/web/test_routes.py
    work:
      - Decide the smallest safe normalization path for low_gain_db/mid_gain_db/high_gain_db.
      - Ensure backend-rendered EQ and UI-drawn curve agree for old settings containing legacy gains and default points.
      - Ensure new Graph EQ edits reset or ignore legacy fields so old gain values do not continue coloring audio invisibly.
    verification:
      - Tests cover legacy settings load/render/UI helper semantics.
  - id: slice_5_operator_feedback_docs_and_full_verification
    title: Finish warnings, docs, rendered UI check, and full verification
    files:
      modify:
        - src/secret_pond/web/static/app.js
        - src/secret_pond/web/static/styles.css
        - docs/operator-guide.md
        - docs/audio-setup-checklist.md
      test:
        - tests/web/test_routes.py
        - tests/test_docs.py
    work:
      - Replace generic-only failure display with source-specific Korean details where available.
      - Document direct dragging, Live source fallback, Live debounce executor, and Stable fallback.
      - Run focused tests, full pytest, ruff, and dashboard rendering verification.
    verification:
      - uv run pytest
      - uv run ruff check .
      - Rendered dashboard screenshot/DOM verification on desktop viewport.
out_of_scope:
  - Spectrum analyzer or live FFT visualization.
  - Preset library or user-saved settings snapshots.
  - Undo/redo.
  - Double-click add, keyboard delete, context menus, multi-select, or automation lanes.
  - Mobile editing optimization.
  - New frontend framework or large UI rewrite.
  - Sample-accurate real-time EQ DSP inside the PortAudio callback.
