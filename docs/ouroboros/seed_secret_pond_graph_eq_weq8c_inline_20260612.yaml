goal: >-
  Replace The Secret Pond's hand-built Graph EQ slider/SVG workspace with a
  WEQ8C Web Component-based professional EQ editor that lives inline inside
  each Loop Mixer layer card, while preserving the existing Python audio
  backend, layer EQ draft state, and Live/Stable apply contracts.
task_type: code

brownfield_context:
  project_type: brownfield
  context_references:
    - path: /Users/nohsungbeen/dev/project/The Secret Pond
      role: primary_checkout
      summary: Main local checkout. The current worktree already contains earlier Graph EQ attempts and generated planning docs.
    - path: AGENTS.md
      role: repository_guidance
      summary: Use Ouroboros for non-trivial work, verify with uv run pytest and uv run ruff check ., and verify rendered dashboard for UI-visible changes.
    - path: src/secret_pond/web/static/index.html
      role: current_dashboard_markup
      summary: Defines top-level workspace tabs, including the current fourth Graph EQ tab and Graph EQ panel markup that must be removed or replaced by inline layer-card markup.
    - path: src/secret_pond/web/static/app.js
      role: current_dashboard_behavior
      summary: Contains Graph EQ state helpers, selected point handling, current graph rendering, layer selection tabs, commitDraftChange integration, workspace tab switching, and layer card rendering.
    - path: src/secret_pond/web/static/styles.css
      role: current_dashboard_styles
      summary: Contains layer card layout, Graph EQ panel styles, layer tab styles, point controls, and responsive dashboard rules.
    - path: src/secret_pond/config.py
      role: eq_model_contract
      summary: Defines EqSettings, EqPointSettings, allowed point types, gain/frequency/Q validation, and the max 6 point model constraint.
    - path: src/secret_pond/audio/graph_eq.py
      role: backend_eq_render_contract
      summary: Backend Graph EQ behavior remains authoritative for audio correctness; WEQ8C is only the UI/state editor.
    - path: src/secret_pond/services/settings_draft.py
      role: draft_apply_entrypoint
      summary: Existing draft updates and Live scheduling/invalidation flow must be reused instead of adding editor-local Apply/Cancel state.
    - path: src/secret_pond/services/live_graph_eq.py
      role: live_apply_contract
      summary: Existing Live Graph EQ request, debounce, latest-wins, failure, and rollback behavior must be preserved in this first slice.
    - path: src/secret_pond/services/playback_apply_mode.py
      role: mode_boundary_contract
      summary: Stable remains Apply and Restart fallback; Live/Stable model refactor is explicitly out of scope for this UI replacement slice.
    - path: tests/test_config.py
      role: eq_model_tests
      summary: Existing tests cover EqSettings defaults, point validation, and related model constraints.
    - path: tests/web/test_routes.py
      role: rendered_dashboard_static_tests
      summary: Existing route/static DOM tests should be extended to assert the new inline UI and absence of the fourth Graph EQ tab.
    - path: tests/web/test_rendered_dashboard_live_ui.py
      role: rendered_dashboard_live_ui_tests
      summary: Existing rendered dashboard tests should cover visible Live/Stable Graph EQ status behavior where applicable.
    - path: tests/web/test_static_app_dashboard_feedback.py
      role: draft_feedback_tests
      summary: Existing static dashboard tests cover commitDraftChange feedback behavior and layer control state propagation.
    - path: docs/ouroboros/seed_secret_pond_graph_eq_live_stable_20260612.yaml
      role: prior_seed
      summary: Earlier seed established draggable EQ points, Stable fallback, Live debounce/render/swap, EQ-free source, and Korean UI copy with English audio terms.
    - path: docs/ouroboros/seed_secret_pond_graph_eq_completion_20260612.yaml
      role: prior_completion_seed
      summary: Follow-up seed documented unfinished direct manipulation and Live executor/source risks, but still assumed a separate Graph EQ workspace.
  current_findings:
    - The current dashboard renders a fourth top-level Graph EQ workspace tab and a separate Graph EQ panel.
    - The current Graph EQ panel then asks the operator to choose Low/Mid/Voice again through internal layer tabs.
    - This flow conflicts with the desired operator model: choose or review a Loop Mixer layer, then tune that same layer in place.
    - Existing app.js already stores Graph EQ by layer and commits updates through commitDraftChange, so the new WEQ8C editor should adapt to existing layer EQ draft state rather than introduce a second editor-local draft.
    - Existing Filter Range controls already belong to layer settings and should remain in the same layer-card flow as Level and Graph EQ.
    - WEQ8C research/spike found that the component works as a direct-manipulation EQ editor, but its host display/flex CSS contract must be preserved so the internal canvas does not collapse.
  existing_patterns:
    - Static HTML/CSS/vanilla JS dashboard; no React/Vite framework.
    - Layer settings are represented under layers.low, layers.mid, and layers.voice.
    - UI changes are staged through draft state and commitDraftChange.
    - Live mode schedules/applies render work through existing Live Graph EQ services.
    - Stable mode keeps edits staged until Apply and Restart.
    - Operator-facing status/action copy is Korean-first; technical audio terms remain English.
  existing_dependencies:
    - Python FastAPI serves the dashboard assets.
    - Existing Python dependency files pyproject.toml and uv.lock are dirty and must not be touched by this slice.
    - No existing frontend build pipeline is assumed; this slice introduces package.json plus esbuild for the WEQ8C bundle only.
    - The built dashboard bundle must be committed so Start Secret Pond works without a runtime frontend build.

constraints:
  - Do not implement a fourth top-level Graph EQ workspace tab. WEQ8C editing must be inline inside Loop Mixer layer cards only.
  - Remove or fully disable the existing top-level Graph EQ tab and its separate layer-switching workflow.
  - Each Loop Mixer layer card must contain Level, Graph EQ, and Filter Range in one visible layer settings flow.
  - The collapsed Graph EQ section must show a mini curve preview and an Edit action for that layer.
  - The expanded Graph EQ section must show a large WEQ8C graph editor and selected point controls inside the same layer card.
  - At most one layer's WEQ8C editor may be expanded at a time.
  - WEQ8C changes must write immediately into the existing layer EQ draft state; do not add an editor-local Apply/Cancel draft.
  - Done or Close collapses the expanded editor only; it does not apply, cancel, or rollback EQ changes.
  - WEQ8C is a UI/state editor only. Python pedalboard/backend Graph EQ rendering remains the audio source of truth.
  - Preserve existing Live/Stable state model in this first slice; do not refactor mode ownership or playback recovery semantics.
  - In Live mode, edits continue through the existing 1 second debounce and pending render invalidation/apply path.
  - In Stable mode, edits remain staged until the existing Apply and Restart action.
  - Allow WEQ8C native add/delete/type interaction, but enforce Secret Pond model limits in the adapter.
  - Maximum 6 EQ points per layer.
  - Supported point types are Low Shelf, Bell / Peak, and High Shelf only, mapped to low_shelf, bell, and high_shelf.
  - Preserve the Secret Pond model ranges unless existing backend validation changes explicitly: 20 Hz to 20 kHz, -18 dB to +18 dB, Q 0.1 to 18.
  - Preserve WEQ8C CSS host display/flex behavior; do not apply external styles such as display:block that collapse the internal visualisation/canvas.
  - Add WEQ8C through package.json plus esbuild frontend bundling.
  - Commit package.json, the Node lockfile, source entry files, and the built static dashboard bundle.
  - Python FastAPI and Start Secret Pond must show the new UI from committed static assets without requiring npm install or npm run build at runtime.
  - Do not edit, format, stage, or commit pyproject.toml or uv.lock.
  - Mobile-specific layout optimization is out of scope; desktop operator layout must still be rendered and verified.
  - Manual QA checklist documentation is out of scope for this first slice.

non_goals:
  - Do not redesign the entire dashboard navigation beyond removing the Graph EQ top-level tab.
  - Do not replace the Python audio rendering pipeline with browser-side DSP.
  - Do not solve the separate Live Graph EQ executor/source fallback work unless it is already required by existing edit propagation tests.
  - Do not add preset libraries for EQ curves in this slice.
  - Do not add mobile-specific controls or responsive redesign.

implementation_slices:
  - id: slice_0_baseline_and_build_contract
    summary: Audit current Graph EQ tab, layer card rendering, static serving, tests, and create frontend package/build contract without touching pyproject.toml or uv.lock.
  - id: slice_1_weq8c_bundle_and_adapter
    summary: Add package.json/esbuild/lockfile/built bundle and implement WEQ8C to EqPointSettings adapter with max/type/range normalization.
  - id: slice_2_inline_layer_card_ui
    summary: Remove the independent Graph EQ workspace and render collapsed/expanded WEQ8C editors inside Loop Mixer layer cards.
  - id: slice_3_state_and_apply_integration
    summary: Wire WEQ8C graph and point controls to existing layer EQ draft state through commitDraftChange, preserving Live/Stable behavior.
  - id: slice_4_browser_and_persistence_verification
    summary: Add Chrome Playwright/DOM tests for editing, add/delete/type, max 6, reload persistence, static bundle loading, and no fourth tab.

acceptance_criteria:
  - id: no_fourth_graph_eq_tab
    description: No top-level Graph EQ workspace tab is rendered, reachable through keyboard tab navigation, or selectable through workspace query/state.
    verification:
      - Static route/DOM test asserts no element with data-workspace-tab="graph-eq" and no workspacePaneGraphEq editing panel.
      - Browser check confirms the visible top-level workspaces are Voice Treatment, Voice Stack, and Loop Mixer only.
  - id: inline_layer_card_flow
    description: Each Loop Mixer layer card presents Level, Graph EQ, and Filter Range as a single layer settings flow without asking the operator to reselect Low/Mid/Voice inside Graph EQ.
    verification:
      - Static DOM test asserts each layer card contains a Graph EQ section and Filter Range section.
      - Static DOM test asserts the old graphEqLayerTabs control is absent.
  - id: collapsed_preview
    description: In the collapsed state, every layer Graph EQ section shows a mini curve preview plus an Edit action tied to that same layer.
    verification:
      - DOM test confirms one mini preview per layer with layer-specific data attributes.
      - Browser visual check confirms the preview fits inside the card without overlapping Level or Filter Range.
  - id: single_expanded_editor
    description: Opening a layer's Graph EQ expands a large WEQ8C editor inside that layer card and collapses any previously expanded layer editor.
    verification:
      - UI test opens Low then Mid and asserts only Mid has the expanded WEQ8C editor.
      - DOM test asserts expanded_layer_id may be null or one of low/mid/voice, never multiple.
  - id: weq8c_canvas_renders
    description: The expanded WEQ8C editor renders a non-collapsed graph canvas with usable direct-manipulation handles.
    verification:
      - Chrome Playwright smoke test asserts the WEQ8C visualisation and canvas have non-zero width and height.
      - Test or DOM inspection confirms no external CSS override collapses the WEQ8C host/internal canvas.
  - id: immediate_draft_update_from_graph
    description: Dragging a WEQ8C graph point immediately updates the corresponding layers.<layer>.eq draft state through the existing draft path.
    verification:
      - Browser/Playwright test drags a point and asserts the layer draft EQ value changed.
      - Static/dashboard feedback test asserts commitDraftChange feedback is associated with the correct layer surface.
  - id: immediate_draft_update_from_controls
    description: Changing selected point Type, Freq, Gain, or Q immediately updates the corresponding layer EQ draft state.
    verification:
      - Browser/DOM test changes selected point controls and asserts layers.<layer>.eq.points changed.
      - Test confirms no editor-local Apply button is required for the state change.
  - id: close_is_not_apply_or_cancel
    description: Done or Close only collapses the expanded editor; it does not apply, cancel, rollback, or reset EQ changes.
    verification:
      - UI test changes a point, closes the editor, reopens it, and asserts the draft change remains.
      - Test confirms no additional apply/cancel state object is introduced for the editor.
  - id: adapter_round_trip
    description: WEQ8C filter state and Secret Pond EqPointSettings round-trip without losing id, type, frequency_hz, gain_db, or q for supported point types.
    verification:
      - Unit tests cover WEQ8C to EqPointSettings conversion.
      - Unit tests cover EqPointSettings to WEQ8C conversion.
      - Unit tests cover repeated round-trip normalization.
  - id: adapter_constraints
    description: The adapter enforces max 6 points, supported LS/PK/HS-only types, and existing backend ranges before committing state.
    verification:
      - Unit tests cover attempts to add a seventh point.
      - Unit tests cover unsupported WEQ8C filter type rejection or normalization.
      - Unit tests cover frequency, gain, and Q boundary values.
  - id: add_delete_type_e2e
    description: WEQ8C native add, delete, and type changes persist through the Secret Pond model adapter and UI rerender.
    verification:
      - Chrome Playwright E2E adds a point, changes its type, deletes a point, and confirms model/UI state.
  - id: max_six_e2e
    description: The UI prevents or rolls back adding more than 6 EQ points for a layer.
    verification:
      - Chrome Playwright E2E attempts to exceed 6 points and asserts the seventh point is not persisted.
      - UI gives clear Korean status copy or disabled affordance without a broken graph.
  - id: reload_persistence
    description: Layer EQ edits made through WEQ8C survive dashboard reload using the existing settings persistence path.
    verification:
      - Browser E2E edits a layer EQ, reloads, and asserts the same layer curve/control values remain.
  - id: live_mode_existing_flow
    description: In Live mode, a WEQ8C edit updates draft state immediately and then participates in the existing 1 second Live debounce/render invalidation flow.
    verification:
      - Service/static test asserts the existing Live Graph EQ pending state or scheduled request is reachable after a WEQ8C edit.
      - No new browser-owned render authority is introduced.
  - id: stable_mode_existing_flow
    description: In Stable mode, a WEQ8C edit remains staged and does not become audible until the existing Apply and Restart action.
    verification:
      - Test asserts no Live execution is scheduled in Stable mode for a WEQ8C edit.
      - Test asserts Apply and Restart remains the audible apply path.
  - id: build_artifacts_committed
    description: package.json, Node lockfile, esbuild entry/source, and built static dashboard bundle are present and committed so Start Secret Pond does not need a frontend build at runtime.
    verification:
      - File existence tests or implementation summary lists package.json, lockfile, source entry, and built bundle.
      - Browser check from Python/FastAPI served assets confirms the WEQ8C UI loads without running npm during app startup.
  - id: python_dependency_files_untouched
    description: pyproject.toml and uv.lock remain unmodified by this slice.
    verification:
      - Final git diff/status explicitly confirms no changes to pyproject.toml or uv.lock were made by the slice.
  - id: final_verification
    description: Focused adapter/UI tests, Chrome Playwright rendered UI checks, uv run pytest, and uv run ruff check . complete before implementation is considered done.
    verification:
      - Implementation summary records exact commands and outcomes.

ontology_schema:
  name: SecretPondWEQ8CInlineGraphEQ
  description: >-
    Domain model for replacing the separate Graph EQ workspace with inline
    WEQ8C editors inside Loop Mixer layer cards while preserving Secret Pond's
    existing layer EQ model and Live/Stable apply semantics.
  fields:
    - name: layer_id
      type: enum
      values: [low, mid, voice]
      description: Loop Mixer layer whose EQ is being previewed or edited.
      required: true
    - name: layer_card_settings_flow
      type: object
      description: The per-layer card layout containing Level, Graph EQ, and Filter Range.
      required: true
    - name: graph_eq_workspace_tab
      type: object
      description: Legacy top-level Graph EQ workspace tab and panel; must be removed or unreachable in the new UX.
      required: false
      expected_state: absent
    - name: graph_eq_section
      type: object
      description: Inline Graph EQ section rendered inside a layer card.
      required: true
    - name: mini_curve_preview
      type: object
      description: Collapsed read-only curve preview for a layer EQ.
      required: true
    - name: expanded_layer_id
      type: nullable_enum
      values: [low, mid, voice, null]
      description: The one layer currently showing the large WEQ8C editor; null when all editors are collapsed.
      required: true
    - name: weq8c_editor
      type: object
      description: The expanded WEQ8C Web Component instance bound to one layer.
      required: true
    - name: weq8c_filter
      type: object
      description: WEQ8C filter representation for Low Shelf, Bell / Peak, or High Shelf points.
      required: true
    - name: eq_point_settings
      type: object
      description: Secret Pond EqPointSettings representation with id, type, frequency_hz, gain_db, and q.
      required: true
    - name: model_adapter
      type: object
      description: Bidirectional conversion layer between WEQ8C filters and Secret Pond EqPointSettings.
      required: true
    - name: layer_eq_draft_state
      type: object
      description: Existing layers.<layer>.eq draft state updated immediately by WEQ8C interactions.
      required: true
    - name: selected_point
      type: nullable_object
      description: Currently selected point shown in controls; null when no point is selected.
      required: true
    - name: selected_point_controls
      type: object
      description: Type, Freq, Gain, and Q controls for the selected point.
      required: true
    - name: close_action
      type: object
      description: UI action that collapses the editor without applying or cancelling draft state.
      required: true
    - name: live_stable_mode
      type: enum
      values: [live, stable]
      description: Existing playback apply mode that governs when EQ draft changes become audible.
      required: true
    - name: debounce_seconds
      type: number
      description: Existing Live Graph EQ debounce duration, fixed at 1 second for this slice.
      required: true
    - name: apply_restart_flow
      type: object
      description: Existing Stable mode Apply and Restart path.
      required: true
    - name: package_json
      type: file
      description: Node package manifest introduced for WEQ8C/esbuild frontend bundling.
      required: true
    - name: node_lockfile
      type: file
      description: Node lockfile committed for reproducible frontend dependencies.
      required: true
    - name: built_bundle
      type: file
      description: Committed static dashboard bundle served by FastAPI at runtime.
      required: true
    - name: chrome_playwright_e2e
      type: test_suite
      description: Browser verification for WEQ8C graph editing, add/delete/type, max 6, persistence, and rendered layout.
      required: true

evaluation_principles:
  - name: UX Flow Integrity
    description: Graph EQ editing must feel like part of editing one layer, not like a separate mode that asks the operator to select the same layer twice.
    weight: 0.25
  - name: Contract Preservation
    description: Existing Python backend audio rendering, layer draft state, Live debounce, and Stable Apply and Restart semantics remain authoritative.
    weight: 0.25
  - name: Adapter Correctness
    description: WEQ8C filters and Secret Pond EqPointSettings convert reliably while enforcing max/type/range constraints.
    weight: 0.2
  - name: Build Reliability
    description: Committed package, lockfile, and built bundle prevent missing-build regressions when running Start Secret Pond.
    weight: 0.15
  - name: Rendered UI Verification
    description: Browser verification proves the WEQ8C canvas is visible, non-collapsed, and integrated into layer cards without overlap.
    weight: 0.15

exit_conditions:
  - name: Seed Scope Implemented
    description: The separate Graph EQ workspace is gone and WEQ8C editing exists inline inside Loop Mixer layer cards.
    criteria: no_fourth_graph_eq_tab, inline_layer_card_flow, collapsed_preview, and single_expanded_editor acceptance criteria pass.
  - name: State Contracts Verified
    description: WEQ8C edits update existing layer EQ draft state and respect Live/Stable mode behavior.
    criteria: immediate_draft_update_from_graph, immediate_draft_update_from_controls, live_mode_existing_flow, and stable_mode_existing_flow pass.
  - name: Adapter Verified
    description: WEQ8C and Secret Pond EQ models round-trip under all agreed constraints.
    criteria: adapter_round_trip, adapter_constraints, add_delete_type_e2e, max_six_e2e, and reload_persistence pass.
  - name: Build And Runtime Verified
    description: Python/FastAPI startup serves the new WEQ8C UI without runtime frontend build steps.
    criteria: build_artifacts_committed and browser-served asset checks pass.
  - name: Repository Verification Complete
    description: Required tests and lint pass, with pyproject.toml and uv.lock untouched.
    criteria: final_verification and python_dependency_files_untouched pass.

