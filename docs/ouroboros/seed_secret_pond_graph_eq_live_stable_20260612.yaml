goal: >-
  Implement a professional-style Graph EQ for The Secret Pond that replaces the
  current fixed Low/Mid/High slider EQ with draggable EQ points, preserves
  Stable mode as the safe Apply and Restart fallback, and adds Live mode
  behavior that applies Graph EQ changes after a 1 second debounce by rendering
  an EQ-free replacement buffer and swapping it into the currently playing
  layer without resetting playback position.
task_type: code
brownfield_context:
  project_type: brownfield
  context_references:
    - path: /Users/nohsungbeen/dev/project/The Secret Pond
      role: primary
      summary: Main checkout for implementation and verification.
    - path: AGENTS.md
      role: repository_guidance
      summary: Requires Ouroboros flow for non-trivial work, uv pytest/ruff verification, rendered dashboard checks for UI-visible changes, and Korean Conventional Commit messages.
    - path: src/secret_pond/config.py
      role: existing_model
      summary: Current EqSettings has low_gain_db, mid_gain_db, high_gain_db, highpass_hz, and lowpass_hz.
    - path: src/secret_pond/audio/renderer.py
      role: audio_rendering
      summary: Current playback EQ is baked into rendered WAV buffers via fixed three-band processing and filter range.
    - path: src/secret_pond/services/settings_draft.py
      role: live_apply_service
      summary: Current Live EQ path renders replacement layer buffers and calls player.set_layer_buffer rather than doing heavy DSP inside the callback.
    - path: src/secret_pond/services/playback_apply_mode.py
      role: mode_boundary
      summary: Existing Live/Stable switching uses playback_render_settings and an EQ-free render marker.
    - path: src/secret_pond/services/settings_changes.py
      role: settings_plan
      summary: Separates runtime-config fields from live-preview reprocessable fields.
    - path: src/secret_pond/web/static/index.html
      role: dashboard_markup
      summary: Current dashboard has Treatment, Voice Stack, and Loop Mixer workspace tabs plus Live/Stable apply mode controls.
    - path: src/secret_pond/web/static/app.js
      role: dashboard_behavior
      summary: Current dashboard has workspaceTabNames, layerControlGroups, Live apply feedback states, and Stable pending-change state helpers.
    - path: src/secret_pond/web/static/styles.css
      role: dashboard_style
      summary: Current dashboard uses dark operator panels, compact controls, status pills, feedback surfaces, and workspace tabs.
    - path: docs/design/lazyweb-ui-notes.md
      role: design_context
      summary: Prior Lazyweb notes establish a dark, dense, operator-first dashboard with compact status rows and DAW-style control density.
  existing_patterns:
    - Keep backend/runtime state as the source of truth.
    - Keep routes thin and move behavior into service modules.
    - Keep Stable Apply and Restart as a safe fallback for runtime-heavy changes.
    - Keep audio callback work lightweight; no file I/O, long renders, slow locks, or large allocations in the callback.
    - Use EQ-free render sources for Live EQ to avoid applying the same EQ twice.
    - Prefer additive state fields and explicit mode contracts over changing existing field meanings.
    - Keep technical audio terms in English and ordinary operator actions/status/messages in Korean.
    - Follow existing static dashboard patterns instead of introducing a new frontend framework.
    - Verify UI-visible changes in the rendered dashboard in addition to tests.
  existing_dependencies:
    - Python project managed with uv.
    - FastAPI backend with static HTML/CSS/JS dashboard.
    - scipy and pedalboard are available for audio processing.
    - sounddevice / PortAudio callback-driven audio output.
    - pytest and ruff are the required verification workflow.
constraints:
  - Preserve Stable mode as the safe Apply and Restart fallback. In Stable mode, Graph EQ point edits update the draft UI immediately but do not change audible playback until Apply and Restart succeeds.
  - Live mode Graph EQ must not be true sample-accurate callback DSP in v1. It must use a 1 second named debounce, background render, playback-position-preserving buffer replacement, and at most a short de-click guard.
  - The debounce duration must be represented by a named constant or config seam such as LIVE_EQ_APPLY_DEBOUNCE_MS = 1000, not hardcoded in scattered UI/service code.
  - Live buffer replacement must be fast rather than musically smooth. Use a maximum 50 ms de-click guard if needed; do not introduce a perceptible slow crossfade for Graph EQ updates.
  - Per-layer Graph EQ settings are required for low, mid, and voice. Each layer has its own point set and filter range values.
  - "The default Graph EQ shape per layer is three points: Low Shelf at 120 Hz / 0 dB, Bell / Peak at 1 kHz / 0 dB, and High Shelf at 8 kHz / 0 dB."
  - Graph EQ supports a maximum of 6 points per layer in v1.
  - Supported point types in v1 are Bell / Peak, Low Shelf, and High Shelf.
  - Low Cut and High Cut remain Filter Range controls inside the Graph EQ panel, visually separate from the curve points.
  - Frequency range is 20 Hz to 20 kHz on a logarithmic x-axis.
  - Gain range is -18 dB to +18 dB.
  - Q is shown as Q. It must be available as a professional control without excessive beginner copy.
  - The graph curve drawn in the browser is a visual approximation for operator control. Audio correctness is defined by backend render/filter behavior, not pixel-perfect curve matching.
  - Dragging a point updates the frontend draft during drag; backend draft persistence and Live debounce scheduling happen on drag end.
  - Numeric Freq, Gain, and Q inputs commit on Enter or blur, not every keystroke.
  - Add/delete point behavior uses explicit + Point and Delete buttons only in v1. No double-click add, keyboard delete, or context menu behavior is required.
  - When no point is selected, the detail area says "점을 선택하세요" and must not auto-select the first point.
  - Selected-layer reset and all-layer reset are required. All-layer reset must ask for confirmation.
  - Graph EQ presets are out of scope in v1. Existing layer EQ preset buttons should be removed or replaced by the new Graph EQ workflow; future settings snapshot save/load will cover reuse.
  - Undo/redo is out of scope in v1.
  - Desktop/operator use is the target. Mobile editing ergonomics are out of scope, but the page must not visibly overlap or break; horizontal overflow or scroll is acceptable at narrow widths.
  - Do not introduce React, Vite, or another large frontend framework. A small drag/scale utility is acceptable only if it reduces code risk.
  - Backend should reuse scipy and/or pedalboard rather than hand-rolling advanced audio math where local dependencies already cover it.
  - Live Graph EQ must render from EQ-free selected sources or EQ-free voice stack material, never from low_playback.wav, mid_playback.wav, voice_playback.wav, or another cache that already contains the same playback EQ.
  - Live render concurrency uses latest-wins request IDs or equivalent. Older completed renders must be discarded if a newer request or mode epoch exists.
  - Live to Stable while a Live EQ render is pending/applying must invalidate pending Live work. Late render results must be discarded and the graph edit remains a Stable staged draft.
  - "Stable to Live with staged Graph EQ changes must require an operator choice: apply staged EQ into Live, discard staged EQ, or cancel the mode switch."
  - Live Graph EQ failure must keep existing playback audible, rollback the graph UI to the last confirmed audible EQ state, show Korean warning copy, and guide the operator to Stable Apply and Restart as fallback.
  - If Live apply takes longer than 3 seconds after editing stops, show a nonfatal Korean caution such as "적용이 오래 걸리는 중"; do not rollback unless the render or swap actually fails.
  - Normal source/local hardware should apply audibly within 3 seconds after edit stops, including debounce, render, and swap. This is a performance target, not a hard real-time guarantee.
  - Existing saved EQ data migration is not required. Missing old/new fields must default safely without crashing, because there is no existing user data to preserve.
  - Preserve unrelated user changes in the worktree. Before implementation, re-check git status and only edit the intended files.
acceptance_criteria:
  - "GraphEqModel: EqSettings or its replacement supports per-layer graph_eq points with type, frequency_hz, gain_db, q, enabled state if needed, and filter range values; default settings create the three agreed flat points and validate 20 Hz-20 kHz, -18 dB to +18 dB, and max 6 points."
  - "LegacySliderRemoval: the old standalone Low/Mid/High EQ slider controls and layer EQ preset buttons are no longer the primary EQ UI; Graph EQ point controls replace that workflow without leaving duplicated or contradictory EQ controls."
  - "RenderCore: backend rendering applies Bell / Peak, Low Shelf, High Shelf, Low Cut, and High Cut in a deterministic order; focused audio tests show that changing Freq/Gain/Q changes rendered samples and that a flat default is effectively neutral."
  - "StableGraphEqContract: in Stable mode, moving/adding/deleting points changes draft settings and shows Apply and Restart required, but active audible playback and playback_render_settings do not change until Apply and Restart succeeds."
  - "StableApplyPath: Apply and Restart in Stable mode renders Graph EQ into playback caches and restarts or updates playback through the existing stable apply path without bypassing current runtime-config guards."
  - "LiveDebounce: in Live mode, point drag end and committed numeric edits schedule exactly one latest-wins Live EQ request after the named 1 second debounce; rapid edits discard older pending requests."
  - "LiveBufferReplacement: after a successful Live EQ render, the currently playing layer buffer is replaced without resetting playback position and with no more than a 50 ms de-click guard."
  - "LiveFeedbackStates: the dashboard exposes Korean-facing Live Graph EQ feedback states for idle/waiting, applying, applied, slow apply caution, failed, and stale/discarded response when relevant."
  - "LiveFailureRollback: if Live render or buffer swap fails, current playback continues, the visible graph rolls back to the last confirmed audible EQ state, and a Korean warning explains that Stable Apply and Restart remains available."
  - "LiveToStableEpoch: switching from Live to Stable while a Live EQ request is pending or applying invalidates that request, discards any late result, and preserves the current graph edit as a Stable staged draft."
  - "StableToLiveGate: switching from Stable to Live with staged Graph EQ changes presents apply/discard/cancel choices and implements each choice without silently losing or applying EQ edits."
  - "NoDoubleEqSource: tests prove Live Graph EQ renders from EQ-free low/mid selected source material and EQ-free voice stack material, not from already-EQ-rendered playback cache files."
  - "LayerTabsUi: the dashboard has one Graph EQ workspace/panel with Low, Mid, and Voice layer tabs; only the selected layer's graph and point controls are active at a time."
  - "GraphEditorUi: the Graph EQ panel contains a large log-frequency graph, labeled frequency ticks from 20 Hz to 20 kHz, gain scale from -18 dB to +18 dB, draggable point handles, an approximate response curve, and a selected point visual state."
  - "PointDetailUi: selected point controls include Type, Freq, Gain, Q, + Point, Delete, selected-layer reset, and all-layer reset with confirmation; when nothing is selected, the panel says 점을 선택하세요."
  - "FilterRangePlacement: Low Cut and High Cut appear as Filter Range controls inside Graph EQ but visually separate from graph points and do not behave as draggable EQ points in v1."
  - "InputCommitPolicy: point dragging persists/schedules only on drag end, and numeric Freq/Gain/Q inputs persist/schedule only on Enter or blur."
  - "CopyPolicy: technical terms such as Graph EQ, Bell / Peak, Low Shelf, High Shelf, Freq, Gain, Q, Low Cut, High Cut, Live, Stable, and Apply and Restart remain English; ordinary status/action copy is Korean."
  - "DesignFit: Graph EQ uses existing dashboard panels, workspace tabs, status pills, feedback surfaces, compact controls, typography, and dark operator visual style rather than a standalone redesigned app surface."
  - "DashboardStability: static app tests and rendered dashboard verification confirm Graph EQ controls do not overlap existing panels on desktop and remain usable with acceptable horizontal overflow at narrow widths."
  - "DocsUpdated: docs/operator-guide.md and docs/audio-setup-checklist.md explain Stable vs Live Graph EQ behavior, failure fallback, and the no-double-EQ source rule in operator-friendly Korean with technical terms preserved where appropriate."
  - "FullVerification: final verification includes targeted tests for model/rendering/mode boundaries/UI behavior, then uv run pytest, uv run ruff check ., and a rendered dashboard check."
ontology_schema:
  name: SecretPondGraphEq
  description: >-
    Domain model for per-layer graph-based EQ editing, Live/Stable apply
    semantics, source safety, and dashboard presentation in The Secret Pond.
  fields:
    - name: graph_eq
      type: object
      description: Per-layer EQ point model replacing the fixed three-band slider workflow.
    - name: eq_point
      type: object
      description: A draggable EQ band with type, frequency_hz, gain_db, q, and optional enabled state.
    - name: filter_range
      type: object
      description: Low Cut and High Cut controls that remain separate from draggable EQ points.
    - name: layer
      type: string
      description: One of low, mid, or voice; each layer has independent Graph EQ settings.
    - name: stable_mode
      type: object
      description: Staged Apply and Restart path where draft edits are not audible until applied.
    - name: live_mode
      type: object
      description: Debounced background render and fast buffer replacement path for audible Graph EQ updates during playback.
    - name: live_eq_request
      type: object
      description: Latest-wins request with debounce timer, request id, mode epoch, target layer, draft EQ snapshot, status, and failure data.
    - name: eq_free_source
      type: object
      description: Source material or cache guaranteed not to contain the same playback EQ, used to prevent double EQ.
    - name: confirmed_audible_eq
      type: object
      description: Last EQ state that was successfully heard in Live mode and used for rollback on failure.
    - name: graph_eq_panel
      type: object
      description: Dashboard UI surface containing layer tabs, graph editor, selected point controls, feedback, and Filter Range.
    - name: ui_feedback
      type: object
      description: Korean-facing status model for pending, applying, applied, slow, failed, and stale Live/Stable states.
evaluation_principles:
  - name: mode_contract_clarity
    description: Stable and Live behavior must be explicit, separated, and protected by tests so old ambiguity does not return.
    weight: 0.22
  - name: audio_safety
    description: Playback must continue on Live failures, avoid callback-heavy work, avoid double EQ, and preserve Stable fallback.
    weight: 0.24
  - name: operator_ux
    description: UI must feel like the existing Secret Pond dashboard while exposing professional Graph EQ controls clearly.
    weight: 0.2
  - name: implementation_focus
    description: v1 must avoid scope creep such as analyzer, presets, undo/redo, multi-select, and mobile editing optimization.
    weight: 0.16
  - name: verification_quality
    description: Tests and rendered UI checks must cover model, rendering, Stable, Live, failure, source, and UI contracts.
    weight: 0.18
exit_conditions:
  - name: all_acceptance_criteria_met
    description: Every acceptance criterion above is implemented and verified.
    criteria: Targeted tests, full pytest, ruff, rendered dashboard verification, and final review all pass.
  - name: blocked_by_runtime_source_contract
    description: Implementation cannot safely identify or produce EQ-free source material for one or more layers.
    criteria: Stop before implementing unsafe double-EQ behavior and return to design with a concrete source-contract blocker.
  - name: blocked_by_live_performance
    description: Typical local Live Graph EQ application consistently exceeds the 3 second target after edit stop.
    criteria: Report measured timing, preserve Stable fallback, and ask whether to reduce scope or accept slower Live behavior.
