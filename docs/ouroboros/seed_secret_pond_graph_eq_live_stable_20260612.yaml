      - Remove or retire old standalone layer EQ slider/preset workflow.
      - Implement drag, add, delete, reset selected layer, reset all layers with confirmation, and Enter/blur numeric commit behavior.
      - Keep technical terms English and status/action copy Korean.
    verification:
      - Static JS/DOM tests for Graph EQ structure and interaction helpers.
      - Rendered dashboard check for desktop layout and no incoherent overlap.
  - id: slice_4_live_debounce_render_swap
    title: Live debounce, latest-wins render, and buffer replacement
    files:
      modify:
        - src/secret_pond/services/settings_draft.py
        - src/secret_pond/services/playback_apply_mode.py
        - src/secret_pond/audio/player.py
        - src/secret_pond/audio/renderer.py
