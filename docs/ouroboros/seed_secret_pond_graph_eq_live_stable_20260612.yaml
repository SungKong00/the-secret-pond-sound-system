        - tests/services/test_playback_apply_mode.py
    work:
      - Define the EQ-free source hierarchy for low, mid, and voice.
      - Prohibit Live Graph EQ from using already-EQ-rendered playback caches.
      - Add tests that fail if voice_playback.wav or layer playback caches are reused as Live EQ sources with EQ already baked in.
