      - Run full test/ruff verification.
      - Verify rendered dashboard layout and report remaining manual checks.
    verification:
      - Full test suite passes.
      - Ruff passes.
      - Rendered dashboard verification notes are included in final report.
ui_research:
  lazyweb_mcp:
    - query: parametric EQ editor
      platform: desktop
      finding: Lazyweb coverage was weak and mostly adjacent, so it should not drive exact EQ interaction design.
    - query: audio control dashboard
      platform: desktop
      finding: Lazyweb coverage was weak but reinforced dense audio-control surfaces and compact playback/status controls as adjacent patterns.
    - query: settings dashboard and status settings panel
      platform: desktop
      finding: Lazyweb dashboard/settings references support compact rows, status badges, explicit save/apply state, and dense operator scanability.
    - design_decision: Use Lazyweb for dashboard consistency and status-panel structure, not for precise professional EQ behavior.
  professional_eq_references:
    - product: FabFilter Pro-Q 4
      url: https://www.fabfilter.com/help/pro-q/using/eqdisplay
      applied_pattern: Large interactive EQ display, editable bands, and overall response curve.
    - product: FabFilter Pro-Q 4 Band Controls
      url: https://www.fabfilter.com/help/pro-q/using/bandcontrols
      applied_pattern: Selected band controls for precise type and parameter editing.
    - product: Ableton Live EQ Eight
      url: https://www.ableton.com/en/manual/live-audio-effect-reference/
      applied_pattern: Drag dots horizontally for frequency, vertically for gain, and expose Q/resonance as a professional parameter.
    - product: iZotope Ozone Equalizer
      url: https://downloads.izotope.com/docs/ozone8/equalizer/index.html
      applied_pattern: EQ nodes, frequency/gain/Q editing, composite curve, and selected-band visual distinction.
    - product: Apple Logic Pro Channel EQ
      url: https://support.apple.com/guide/logicpro/channel-eq-parameters-lgcef1edc1d7/mac
      applied_pattern: Central graphic display plus band parameters and analyzer-style layout conventions.
  secret_pond_design_alignment:
    - Keep the first screen as the operator dashboard, not a landing page.
    - Keep the dark, dense, compact panel style already used in the current dashboard.
    - Reuse workspace tabs, status pills, feedback-surface states, compact controls, and existing Korean/English copy policy.
    - Add one Graph EQ surface with Low/Mid/Voice tabs instead of three separate small graphs.
    - Keep Live/Stable apply status visible near the Graph EQ workflow so operator expectations are explicit.
out_of_scope:
  - True real-time callback DSP for Graph EQ.
  - Spectrum analyzer or FFT overlay.
  - EQ Match, dynamic EQ, linear-phase modes, mid/side processing, oversampling, or mastering-grade Pro-Q/Ozone feature parity.
  - Graph EQ presets or preset browser.
  - Undo/redo history.
  - Multi-select band editing.
  - Keyboard shortcuts beyond normal input focus behavior.
  - Double-click add, keyboard delete, context menus, and other advanced editor gestures.
  - Mobile-first editing ergonomics.
  - Existing saved-data migration.
verification_plan:
  targeted_tests:
    - uv run pytest tests/test_config.py
    - uv run pytest tests/audio
    - uv run pytest tests/services/test_settings_draft.py tests/services/test_playback_apply_mode.py tests/services/test_settings_apply.py
    - uv run pytest tests/web/test_routes.py
  full_verification:
    - uv run pytest
    - uv run ruff check .
    - rendered dashboard verification for Graph EQ layout and no incoherent overlap
  manual_checks:
    - Listen to Live Graph EQ update on local output hardware.
    - Confirm Stable Apply and Restart remains the safe fallback after Live failure.
    - Confirm typical Live apply timing is within the 3 second target after edit stop on local sources.
