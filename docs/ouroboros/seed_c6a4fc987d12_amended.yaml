evaluation_principles:
  - name: RuntimeSafety
    description: Playback continues without callback instability, unintended output stop, or file I/O in callback paths.
    weight: 0.25
  - name: StableFallbackPreservation
    description: Existing Stable Apply and Restart behavior remains available and reliable.
    weight: 0.20
  - name: LiveBehaviorCorrectness
    description: Live mode applies the agreed volume, mute, seek, crossfade, Voice Raw treatment preview, and EQ behavior immediately.
    weight: 0.25
  - name: BrownfieldMaintainability
    description: Implementation follows existing module boundaries and additive contracts.
    weight: 0.15
  - name: OperatorUXFit
    description: UI communicates Live vs Stable behavior clearly and fits the current dashboard style.
    weight: 0.10
  - name: CommitAndVerificationDiscipline
    description: Work is sliced, tested, committed, and verified as requested.
    weight: 0.05
exit_conditions:
  - name: LiveModeImplemented
    description: Live mode applies all in-scope controls without Apply and Restart.
    criteria: Volume, mute, seek, ready-immediate VS crossfade, Voice Raw preview treatment, and Live EQ acceptance criteria pass.
  - name: StableModePreserved
    description: Stable fallback still works.
    criteria: Existing Apply and Restart/rendered-cache tests pass and UI still distinguishes non-Live settings.
  - name: UIIntegrated
    description: Dashboard reflects Live/Stable behavior in the existing style.
    criteria: Static app tests and rendered UI verification pass.
  - name: SliceCommitPolicySatisfied
    description: Work was committed after each divided task unit.
    criteria: Git history contains focused Korean Conventional Commit messages for completed slices.
  - name: FullVerificationComplete
    description: Repository verification succeeds.
    criteria: uv run pytest and uv run ruff check . pass.
