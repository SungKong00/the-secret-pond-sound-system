      required: true
    - name: live_eq_runtime
      type: object
      description: Live EQ coefficient/state handling and no-double-EQ source contract.
      required: true
    - name: state_contract
      type: object
      description: Additive playback state/API fields.
      required: true
    - name: ui_contract
      type: object
      description: Dashboard controls, labels, and refresh-stability behavior.
      required: true
    - name: task_commits
      type: array
      description: Slice-level test and commit records.
