  rule: >-
    After each divided task unit is complete, run relevant tests, commit the
    focused changes, and only then proceed to the next unit.
  format: Korean Conventional Commit
  examples:
    - "test: Live 모드 보호 테스트 추가"
    - "feat: Live 재생 모드 계약 추가"
    - "feat: Live 볼륨과 뮤트 적용 추가"
    - "feat: 루프 기준 seek 제어 추가"
    - "feat: 준비 즉시 Voice Stack 전환 추가"
    - "feat: Voice Raw 미리듣기 Live 처리 추가"
    - "feat: Live EQ 적용 추가"
    - "feat: Live 모드 UI 추가"
verification_requirements:
  targeted:
    - Audio player/mixer tests for gain ramp, seek, crossfade, and Live EQ.
    - Service and route tests for Live/Stable mode contract and Voice Raw preview treatment.
    - Web/static app tests for UI messaging, refresh stability, and controls.
  full:
    - uv run pytest
    - uv run ruff check .
  rendered_ui:
    - Verify the dashboard renders new controls in the existing style.
    - Verify active dropdowns/toggles/details do not close during state refresh.
    - Verify Live mode messaging is clear in Korean for ordinary operator actions.
